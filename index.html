<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 用例跑测管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-title {
            font-size: 14px;
            color: #909399;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #303133;
        }

        .stat-trend {
            font-size: 12px;
            margin-top: 5px;
        }

        .trend-up {
            color: #67c23a;
        }

        .trend-down {
            color: #f56c6c;
        }

        /* Charts */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px 20px 30px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 550px;
        }

        .chart-card canvas {
            max-height: 450px;
            width: 100% !important;
        }

        /* Main Content */
        .main-content {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 700px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: #409eff;
            color: white;
        }

        .btn-primary:hover {
            background: #66b1ff;
        }

        .btn-success {
            background: #67c23a;
            color: white;
        }

        .btn-success:hover {
            background: #85ce61;
        }

        .btn-warning {
            background: #e6a23c;
            color: white;
        }

        .btn-warning:hover {
            background: #ebb563;
        }

        .btn-info {
            background: #909399;
            color: white;
        }

        .btn-info:hover {
            background: #a6a9ad;
        }

        .btn-danger {
            background: #f56c6c;
            color: white;
        }

        .btn-danger:hover {
            background: #f78989;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Query Bar */
        .query-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .query-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .query-item label {
            font-size: 14px;
            color: #606266;
        }

        .query-item input,
        .query-item select {
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            min-width: 180px;
        }

        .query-item .datetime-picker {
            width: 180px;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            max-width: 100%;
        }

        table {
            min-width: 1400px;
            width: 100%;
        }

        th, td {
            min-width: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ebeef5;
        }

        th {
            background: #f5f7fa;
            font-weight: 600;
            color: #606266;
        }

        td {
            font-size: 14px;
        }

        .status-pass {
            color: #67c23a;
        }

        .status-fail {
            color: #f56c6c;
        }

        .completion-bar {
            width: 100px;
            height: 8px;
            background: #e4e7ed;
            border-radius: 4px;
            overflow: hidden;
        }

        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, #67c23a, #409eff);
            border-radius: 4px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
        }

        .pagination button {
            padding: 8px 15px;
            border: 1px solid #dcdfe6;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .pagination button.active {
            background: #409eff;
            color: white;
            border-color: #409eff;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .modal-close {
            cursor: pointer;
            font-size: 24px;
            color: #909399;
        }

        .modal-body {
            padding: 20px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: bold;
            color: #303133;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-item.full-width {
            grid-column: span 2;
        }

        .form-item label {
            font-size: 14px;
            color: #606266;
        }

        .form-item input[type="text"],
        .form-item input[type="number"],
        .form-item select,
        .form-item textarea {
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
        }

        .form-item textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-item input[type="range"] {
            width: 100%;
        }

        .completion-value {
            font-weight: bold;
            color: #409eff;
        }

        /* Markdown Editor */
        .markdown-editor {
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            min-height: 300px;
        }

        .markdown-preview {
            padding: 20px;
            line-height: 1.8;
        }

        .markdown-preview h1 { font-size: 24px; margin-bottom: 16px; }
        .markdown-preview h2 { font-size: 20px; margin-bottom: 12px; }
        .markdown-preview h3 { font-size: 16px; margin-bottom: 10px; }
        .markdown-preview ul { margin-left: 20px; margin-bottom: 10px; }
        .markdown-preview ol { margin-left: 20px; margin-bottom: 10px; }
        .markdown-preview blockquote {
            border-left: 4px solid #409eff;
            padding-left: 15px;
            margin: 15px 0;
            color: #606266;
            background: #f5f7fa;
            padding: 10px 15px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #ebeef5;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Detail View */
        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section-title {
            font-size: 16px;
            font-weight: bold;
            color: #303133;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .detail-row {
            display: flex;
            margin-bottom: 10px;
        }

        .detail-label {
            width: 150px;
            font-size: 14px;
            color: #909399;
            flex-shrink: 0;
        }

        .detail-value {
            flex: 1;
            font-size: 14px;
            color: #606266;
            word-break: break-word;
        }

        .detail-value.pass {
            color: #67c23a;
        }

        .detail-value.fail {
            color: #f56c6c;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            border-left: 4px solid #67c23a;
        }

        .toast-error {
            border-left: 4px solid #f56c6c;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="stat-card">
                <div class="stat-title">总用例数</div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-trend trend-up">实时统计</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">编译通过率</div>
                <div class="stat-value" id="stat-compile-rate">0%</div>
                <div class="stat-trend trend-up">第1回合</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">MVP通过率</div>
                <div class="stat-value" id="stat-mvp-rate">0%</div>
                <div class="stat-trend trend-up">第3回合</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">平均完整度</div>
                <div class="stat-value" id="stat-completion">0%</div>
                <div class="stat-trend">AI生成质量</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-container">
            <div class="chart-card">
                <div class="form-section-title" id="compileChartTitle">编译通过率趋势</div>
                <canvas id="compileChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="form-section-title" id="mvpChartTitle">MVP通过率趋势</div>
                <canvas id="mvpChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="form-section-title" id="loopChartTitle">最小循环通过情况</div>
                <canvas id="loopChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="form-section-title" id="templateChartTitle">AI模板使用次数</div>
                <canvas id="templateChart"></canvas>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <div class="header-title">用例列表</div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openModal('add')">
                        <i style="font-style: normal;">+</i> 新增
                    </button>
                    <button class="btn btn-success" onclick="exportExcel()">
                        <i style="font-style: normal;">↓</i> 导出Excel
                    </button>
                    <button class="btn btn-warning" onclick="exportMarkdown()">
                        <i style="font-style: normal;">📄</i> 导出Markdown
                    </button>
                    <button class="btn btn-info" onclick="exportJSON()">
                        <i style="font-style: normal;">{ }</i> 导出JSON
                    </button>
                    <button class="btn btn-danger" onclick="batchDelete()" id="btn-batch-delete" disabled>
                        <i style="font-style: normal;">🗑</i> 批量删除
                    </button>
                </div>
            </div>

            <!-- Query Bar -->
            <div class="query-bar">
                <div class="query-item">
                    <label>用例名称：</label>
                    <input type="text" id="query-caseName" placeholder="输入用例名称">
                </div>
                <div class="query-item">
                    <label>环境：</label>
                    <select id="query-environment">
                        <option value="">全部环境</option>
                        <option value="Unity">Unity</option>
                        <option value="UE4">UE4</option>
                        <option value="UE5">UE5</option>
                        <option value="Android">Android</option>
                        <option value="iOS">iOS</option>
                        <option value="Web">Web</option>
                        <option value="其它">其它</option>
                    </select>
                </div>
                <div class="query-item">
                    <label>编译通过：</label>
                    <select id="query-compilePass">
                        <option value="">全部</option>
                        <option value="true">通过</option>
                        <option value="false">不通过</option>
                    </select>
                </div>
                <div class="query-item">
                    <label>MVP通过：</label>
                    <select id="query-mvpPass">
                        <option value="">全部</option>
                        <option value="true">通过</option>
                        <option value="false">不通过</option>
                    </select>
                </div>
                <div class="query-item">
                    <label>日期范围：</label>
                    <input type="date" id="query-dateStart" style="width: 150px;">
                    <span style="color: #909399;">至</span>
                    <input type="date" id="query-dateEnd" style="width: 150px;">
                </div>
                <div class="query-item">
                    <label>只显示特定日期：</label>
                    <input type="date" id="query-specificDate" style="width: 150px;" onchange="handleSpecificDate()">
                </div>
                <div class="query-item" style="margin-left: auto;">
                    <button class="btn btn-primary" onclick="handleQuery()">查询</button>
                    <button class="btn" onclick="handleReset()">重置</button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th style="width: 50px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                            <th style="min-width: 120px;">用例名称</th>
                            <th style="min-width: 80px;">环境</th>
                            <th style="min-width: 130px;">生成耗时(分钟)</th>
                            <th style="min-width: 80px;">代码量</th>
                            <th style="min-width: 150px;">完整度</th>
                            <th style="min-width: 80px;">编译</th>
                            <th style="min-width: 100px;">最小循环</th>
                            <th style="min-width: 80px;">MVP</th>
                            <th style="min-width: 180px;">更新时间</th>
                            <th style="min-width: 200px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button onclick="changePage(1)" id="btn-first">首页</button>
                <button onclick="changePage(currentPage - 1)" id="btn-prev">上一页</button>
                <span id="page-info" style="align-self: center;">1 / 1</span>
                <button onclick="changePage(currentPage + 1)" id="btn-next">下一页</button>
                <button onclick="changePage(totalPages)" id="btn-last">末页</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">新增用例</div>
                <div class="modal-close" onclick="closeModal(event)">×</div>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Form will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailOverlay" onclick="closeDetailModal(event)">
        <div class="modal" style="max-width: 1000px;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">用例详情</div>
                <div class="modal-close" onclick="closeDetailModal(event)">×</div>
            </div>
            <div class="modal-body" id="detailBody">
                <!-- Detail content will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ===== Supabase 初始化 =====
        const supabaseUrl = "https://vfnwjliyymomvrznoein.supabase.co/rest/v1/";
        const supabaseKey = "sb_publishable_6Iil0s2n6E2dNenGDOj3cw_VXHnd7yg";
        
        const supabase = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        );
        // Mock Data
        let tableData = [];
        let selectedIds = [];
        let currentPage = 1;
        let pageSize = 10;
        let totalPages = 1;
        let currentMode = 'add';
        let currentRow = null;
        let md = window.markdownit();

        const environments = ['Unity', 'UE4', 'UE5', 'Android', 'iOS', 'Web', '其它'];
        const templates = ['UI模板V2', '功能开发Prompt', '测试模板A', '重构模板B', '优化模板C'];
        const caseNames = ['登录UI', '注册页面', '用户设置', '数据看板', 'API测试', '性能优化', '代码重构', '单元测试', '集成测试', 'UI组件库'];

        // Initialize
        window.onload = function() {
            loadData();
            initCharts();
            updateDashboard();
            updateChartTitles();
        };

        // Load Data
        function loadData() {
            tableData = [];
            // Generate data for last 30 days
            for (let i = 0; i < 30; i++) {
                const dayOffset = Math.floor(Math.random() * 30);
                const date = new Date();
                date.setDate(date.getDate() - dayOffset);

                const environment = environments[Math.floor(Math.random() * environments.length)];
                const compilePass = Math.random() > 0.2;
                const loopPass = compilePass && Math.random() > 0.3;
                const mvpPass = loopPass && Math.random() > 0.25;
                const completion = Math.floor(Math.random() * 40) + 60;

                tableData.push({
                    id: i + 1,
                    caseName: caseNames[Math.floor(Math.random() * caseNames.length)],
                    environment: environment,
                    generateTime: parseFloat((Math.random() * 10 + 1).toFixed(1)),
                    codeLines: Math.floor(Math.random() * 800) + 200,
                    template: templates[Math.floor(Math.random() * templates.length)],
                    completion: completion,
                    compilePass: compilePass,
                    loopPass: loopPass,
                    mvpPass: mvpPass,
                    summary: `用例${i+1}整体测试通过，功能正常。`,
                    errorMessage: compilePass ? '' : '编译错误：缺少using namespace std;',
                    manualSummary: '测试通过，无明显问题。',
                    aiSummary: `# AI总结\n\n## 本次任务\n\n完成测试。\n\n## 优点\n\n- 测试完整\n\n## 建议\n\n- 继续优化`,
                    createTime: date.toLocaleString('zh-CN'),
                    updateTime: date.toLocaleString('zh-CN')
                });
            }
            tableData.sort((a, b) => new Date(b.updateTime) - new Date(a.updateTime));

            // Set default date to last day
            const lastDay = new Date(tableData[0].updateTime).toLocaleDateString('zh-CN');
            document.getElementById('query-specificDate').value = lastDay;

            renderTable();
            updateChartTitles();
        }

        // Filter Data
        function getFilteredData() {
            let data = [...tableData];

            // Filter by case name
            const caseName = document.getElementById('query-caseName').value.toLowerCase();
            if (caseName) {
                data = data.filter(item => item.caseName.toLowerCase().includes(caseName));
            }

            // Filter by environment
            const environment = document.getElementById('query-environment').value;
            if (environment) {
                data = data.filter(item => item.environment === environment);
            }

            // Filter by compile pass
            const compilePass = document.getElementById('query-compilePass').value;
            if (compilePass) {
                data = data.filter(item => item.compilePass === (compilePass === 'true'));
            }

            // Filter by MVP pass
            const mvpPass = document.getElementById('query-mvpPass').value;
            if (mvpPass) {
                data = data.filter(item => item.mvpPass === (mvpPass === 'true'));
            }

            // Filter by date range
            const dateStart = document.getElementById('query-dateStart').value;
            const dateEnd = document.getElementById('query-dateEnd').value;
            if (dateStart && dateEnd) {
                const startDate = new Date(dateStart + ' 00:00:00');
                const endDate = new Date(dateEnd + ' 23:59:59');
                data = data.filter(item => {
                    const itemDate = new Date(item.updateTime);
                    return itemDate >= startDate && itemDate <= endDate;
                });
                console.log('日期范围筛选:', dateStart, '至', dateEnd, '找到数据:', data.length);
            }

            return data;
        }

        // Render Table
        function renderTable() {
            const filteredData = getFilteredData();
            const specificDateValue = document.getElementById('query-specificDate').value;

            // 统一日期格式：将 yyyy-MM-dd 转换为 yyyy/M/d
            const normalizeDate = (dateStr) => {
                if (!dateStr) return dateStr;
                const parts = dateStr.split('-');

        // Selection
        function toggleSelect(id) {
            const index = selectedIds.indexOf(id);
            if (index > -1) {
                selectedIds.splice(index, 1);
            } else {
                selectedIds.push(id);
            }
            document.getElementById('btn-batch-delete').disabled = selectedIds.length === 0;
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            const filteredData = getFilteredData();
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);

            if (selectAll) {
                pageData.forEach(item => {
                    if (!selectedIds.includes(item.id)) {
                        selectedIds.push(item.id);
                    }
                });
            } else {
                pageData.forEach(item => {
                    const index = selectedIds.indexOf(item.id);
                    if (index > -1) {
                        selectedIds.splice(index, 1);
                    }
                });
            }
            document.getElementById('btn-batch-delete').disabled = selectedIds.length === 0;
            renderTable();
        }

        function updateSelectAll() {
            const filteredData = getFilteredData();
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            const allSelected = pageData.length > 0 && pageData.every(item => selectedIds.includes(item.id));
            document.getElementById('selectAll').checked = allSelected;

        function updateCharts() {
            const filteredData = getFilteredData();
            const specificDate = document.getElementById('query-specificDate').value;

            // 统一日期格式：将 yyyy-MM/dd 转换为 yyyy/M/d
            const normalizeDate = (dateStr) => {
                if (!dateStr) return dateStr;
                const parts = dateStr.split('-');
                return `${parts[0]}/${parts[1]}/${parts[2]}`;
            };

            const normalizedDate = normalizeDate(specificDate);

            // 如果选择了特定日期，只显示该日期的数据
            let chartsData = filteredData;
            if (normalizedDate) {
                chartsData = filteredData.filter(item => {
                    const itemDate = new Date(item.updateTime).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
                    return itemDate === normalizedDate;
                });
                console.log('筛选日期:', specificDate, '归一化后:', normalizedDate, '找到数据:', chartsData.length);
            }

            // 如果选择了特定日期但没找到数据，保持空数组
            if (chartsData.length === 0 && normalizedDate) {
                console.log('没有找到日期:', specificDate, '的数据');
            }

            // Compile rate trend (show individual pass rate for each test case)
            const compileRateData = chartsData.map(item => {
                return item.compilePass ? 100 : 0;
            });
            compileChart.data.labels = compileRateData.map((_, i) => `测试${i + 1}`);
            compileChart.data.datasets[0].data = compileRateData;
            compileChart.update();

            // MVP rate trend (show individual pass rate for each test case)
            const mvpRateData = chartsData.map(item => {
                return item.mvpPass ? 100 : 0;
            });
            mvpChart.data.labels = mvpRateData.map((_, i) => `测试${i + 1}`);
            mvpChart.data.datasets[0].data = mvpRateData;
            mvpChart.update();

            // Minimum loop pass distribution
            let loopPassCounts = {
                '通过': 0,
                '不通过': 0
            };

            // 如果选择了特定日期，只显示该日期的数据；否则显示所有数据
            let loopPassData = filteredData;
            if (normalizedDate) {
                loopPassData = filteredData.filter(item => {
                    const itemDate = new Date(item.updateTime).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
                    return itemDate === normalizedDate;
                });
            }

            console.log('最小循环数据总数:', loopPassData.length, '通过:', loopPassCounts['通过'], '不通过:', loopPassCounts['不通过']);

            loopPassData.forEach(item => {
                if (item.loopPass) {
                    loopPassCounts['通过']++;
                } else {
                    loopPassCounts['不通过']++;
                }
            });

            console.log('最小循环通过统计 - 通过:', loopPassCounts['通过'], '不通过:', loopPassCounts['不通过']);
            console.log('loopPassData中的数据:', loopPassData);

            loopChart.data.labels = Object.keys(loopPassCounts);
            loopChart.data.datasets[0].data = Object.values(loopPassCounts);
            loopChart.data.datasets[0].backgroundColor = ['#67c23a', '#f56c6c'];
            loopChart.update();

            // Template usage
            const templateCounts = {};
            loopPassData.forEach(item => {
                templateCounts[item.template] = (templateCounts[item.template] || 0) + 1;
            });
            templateChart.data.labels = Object.keys(templateCounts);
            templateChart.data.datasets[0].data = Object.values(templateCounts);
            templateChart.update();
        }

        function saveData() {
            const caseName = document.getElementById('caseName').value;
            const environment = document.getElementById('environment').value;
            const generateTime = parseFloat(document.getElementById('generateTime').value);
            const codeLines = parseInt(document.getElementById('codeLines').value);
            const template = document.getElementById('template').value;
            const completion = parseInt(document.getElementById('completion').value);
            const compilePass = document.getElementById('compilePass').value === 'true';
            const loopPass = document.getElementById('loopPass').value === 'true';
            const mvpPass = document.getElementById('mvpPass').value === 'true';
            const summary = document.getElementById('summary').value;
            const errorMessage = document.getElementById('errorMessage').value;
            const manualSummary = document.getElementById('manualSummary').value;
            const aiSummary = document.getElementById('aiSummary').value;
            const createTime = document.getElementById('createTime').value;
            const updateTime = document.getElementById('updateTime').value;

            if (!caseName || !environment || isNaN(generateTime) || isNaN(codeLines) || !template || isNaN(completion) ||
                compilePass === null || loopPass === null || mvpPass === null || !summary || !aiSummary) {
                showToast('请填写所有必填字段', 'error');
                return;
            }

            if (currentMode === 'add') {
                const newId = tableData.length > 0 ? Math.max(...tableData.map(d => d.id)) + 1 : 1;
                const newItem = {
                    id: newId,
                    caseName,
                    environment,
                    generateTime,
                    codeLines,
                    template,
                    completion,
                    compilePass,
                    loopPass,
                    mvpPass,
                    summary,
                    errorMessage,
                    manualSummary,
                    aiSummary,
                    createTime,
                    updateTime: new Date().toLocaleString('zh-CN')
                };
                tableData.unshift(newItem);
                showToast('添加成功', 'success');
            } else if (currentMode === 'edit') {
                const index = tableData.findIndex(d => d.id === currentRow.id);
                if (index !== -1) {
                    tableData[index] = {
                        ...tableData[index],
                        caseName,
                        environment,
                        generateTime,
                        codeLines,
                        template,
                        completion,
                        compilePass,
                        loopPass,
                        mvpPass,
                        summary,
                        errorMessage,
                        manualSummary,
                        aiSummary,
                        updateTime: new Date().toLocaleString('zh-CN')
                    };
                    showToast('更新成功', 'success');
                }
            }

            closeModal();
            currentPage = 1;
            updateDashboard();
            updateCharts();
            renderTable();
        }

                    </div>
                    <div class="detail-row">
                        <div class="detail-label">生成耗时:</div>
                        <div class="detail-value">${row.generateTime} 分钟</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">代码量:</div>
                        <div class="detail-value">${row.codeLines} 行</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">匹配模板:</div>
                        <div class="detail-value">${row.template}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">完整度:</div>
                        <div class="detail-value">
                            <div class="completion-bar" style="width: 100px;">
                                <div class="completion-fill" style="width: ${row.completion}%"></div>
                            </div>
                            ${row.completion}%
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">跑测阶段</div>
                    <div class="detail-row">
                        <div class="detail-label">第1回合 (编译):</div>
                        <div class="detail-value ${row.compilePass ? 'pass' : 'fail'}">${row.compilePass ? '✅ 通过' : '❌ 不通过'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">第2回合 (最小循环):</div>
                        <div class="detail-value ${row.loopPass ? 'pass' : 'fail'}">${row.loopPass ? '✅ 通过' : '❌ 不通过'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">第3回合 (MVP):</div>
                        <div class="detail-value ${row.mvpPass ? 'pass' : 'fail'}">${row.mvpPass ? '✅ 通过' : '❌ 不通过'}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">文本信息</div>
                    <div class="detail-row">
                        <div class="detail-label">跑测总结:</div>
                        <div class="detail-value">${row.summary}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">报错信息:</div>
                        <div class="detail-value">${row.errorMessage || '无'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">总结:</div>
                        <div class="detail-value">${row.manualSummary || '无'}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">AI总结</div>
                    <div class="markdown-preview">${aiSummaryHtml}</div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">时间信息</div>
                    <div class="detail-row">
                        <div class="detail-label">创建时间:</div>
                        <div class="detail-value">${row.createTime}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">更新时间:</div>
                        <div class="detail-value">${row.updateTime}</div>
                    </div>
                </div>
            `;

            document.getElementById('detailOverlay').classList.add('show');
            document.getElementById('detailOverlay').style.display = 'flex';
        }

        function closeDetailModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('detailOverlay').classList.remove('show');
            document.getElementById('detailOverlay').style.display = 'none';
        }

        // Delete
        function deleteRow(id) {
            if (confirm('确定要删除这条记录吗？')) {
                tableData = tableData.filter(item => item.id !== id);
                selectedIds = selectedIds.filter(item => item !== id);
                updateDashboard();
                updateCharts();
                renderTable();
                showToast('删除成功', 'success');
            }
        }

        function batchDelete() {
            if (confirm(`确定要删除选中的 ${selectedIds.length} 条记录吗？`)) {
                tableData = tableData.filter(item => !selectedIds.includes(item.id));
                selectedIds = [];
                updateDashboard();
                updateCharts();
                renderTable();
                showToast('批量删除成功', 'success');
            }
        }

        // Copy
        function copyRow(id) {
            const row = tableData.find(d => d.id === id);
            if (!row) return;

            const now = new Date().toLocaleString('zh-CN');
            const newRow = {
                ...row,
                id: Math.max(...tableData.map(d => d.id), 0) + 1,
                caseName: row.caseName + ' (副本)',
                createTime: row.createTime,
                updateTime: now
            };
            tableData.unshift(newRow);
            updateDashboard();
            updateCharts();
            renderTable();
            showToast('复制成功', 'success');
        }

        // Export
        function exportExcel() {
            const data = getFilteredData().map(item => ({
                'ID': item.id,
                '用例名称': item.caseName,
                '环境': item.environment,
                '生成耗时(分钟)': item.generateTime,
                '代码量': item.codeLines,
                '匹配模板': item.template,
                '完整度': item.completion + '%',
                '第1回合(编译)': item.compilePass ? '通过' : '不通过',
                '第2回合(最小循环)': item.loopPass ? '通过' : '不通过',
                '第3回合(MVP)': item.mvpPass ? '通过' : '不通过',
                '跑测总结': item.summary,
                '报错信息': item.errorMessage,
                '总结': item.manualSummary,
                '创建时间': item.createTime,
                '更新时间': item.updateTime
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '用例列表');
            XLSX.writeFile(wb, 'AI用例跑测列表.xlsx');
            showToast('导出成功', 'success');
        }

        function exportMarkdown() {
            const data = getFilteredData();
            let mdContent = '# AI用例跑测列表\n\n';
            mdContent += `导出时间: ${new Date().toLocaleString('zh-CN')}\n\n`;
            mdContent += `总用例数: ${data.length}\n\n`;
            mdContent += '---\n\n';

            data.forEach(item => {
                mdContent += `## 用例 #${item.id}: ${item.caseName}\n\n`;
                mdContent += `**环境:** ${item.environment}\n`;
                mdContent += `**生成耗时:** ${item.generateTime} 分钟\n`;
                mdContent += `**代码量:** ${item.codeLines} 行\n`;
                mdContent += `**模板:** ${item.template}\n`;
                mdContent += `**完整度:** ${item.completion}%\n`;
                mdContent += `**第1回合(编译):** ${item.compilePass ? '✅ 通过' : '❌ 不通过'}\n`;
                mdContent += `**第2回合(最小循环):** ${item.loopPass ? '✅ 通过' : '❌ 不通过'}\n`;
                mdContent += `**第3回合(MVP):** ${item.mvpPass ? '✅ 通过' : '❌ 不通过'}\n`;
                mdContent += `**更新时间:** ${item.updateTime}\n\n`;
                mdContent += `### 跑测总结\n${item.summary}\n\n`;
                mdContent += `### AI总结\n`;
                mdContent += md.render(item.aiSummary || '# 无AI总结\n') + '\n';
                mdContent += '---\n\n';
            });

            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'AI用例跑测列表.md';
            link.click();
            showToast('导出成功', 'success');
        }

        function exportJSON() {
            const data = getFilteredData().map(item => ({
                id: item.id,
                caseName: item.caseName,
                environment: item.environment,
                generateTime: item.generateTime,
                codeLines: item.codeLines,
                template: item.template,
                completion: item.completion,
                compilePass: item.compilePass,
                loopPass: item.loopPass,
                mvpPass: item.mvpPass,
                summary: item.summary,
                errorMessage: item.errorMessage,
                manualSummary: item.manualSummary,
                aiSummary: item.aiSummary,
                createTime: item.createTime,
                updateTime: item.updateTime
            }));

            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'AI用例跑测列表.json';
            link.click();
            showToast('导出成功', 'success');
        }

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
